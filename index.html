<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q'SHOW - Trilhas de uma Vida</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    
    <style>
        /* Reset básico para não ter sobras brancas */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            
            /* --- CONFIGURAÇÃO DO SEU FUNDO (TELA CHEIA) --- */
            background-image: url('fundo.png'); /* Nome do arquivo que você salvou */
            background-size: cover; /* Faz a imagem esticar e cobrir tudo */
            background-position: center center; /* Mantém o centro do túnel no meio */
            background-attachment: fixed; /* O fundo não mexe quando você rola a página */
            background-repeat: no-repeat;
            background-color: #000; /* Cor de segurança caso a imagem demore a carregar */
        }

        /* Camada escura sutil para o texto não sumir no brilho da imagem */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Escurece um pouco a imagem */
            z-index: -1;
        }

        header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            border-bottom: 2px solid #c5a059;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        .logo {
            font-family: 'Oswald', sans-serif;
            font-size: 3rem;
            color: #c5a059;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .player-live {
            margin-top: 10px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .blink {
            width: 10px; height: 10px;
            background: red; border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse { 50% { opacity: 0.2; } }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            z-index: 5;
            width: 100%;
        }

        /* --- CARD DE DESTAQUE --- */
        .card {
            width: 100%;
            max-width: 500px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #c5a059;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border-radius: 4px;
        }

        .label-hoje {
            color: #c5a059;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: block;
        }

        .titulo-filme {
            font-family: 'Oswald', sans-serif;
            font-size: 3rem;
            margin-bottom: 15px;
            line-height: 1;
            text-transform: uppercase;
        }

        .nome-musica {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.5rem;
            color: #bdc3c7;
            margin-bottom: 50px;
        }

        .botao-youtube {
            background: #ff0000;
            color: white;
            text-decoration: none;
            padding: 20px 50px;
            font-weight: 900;
            text-transform: uppercase;
            display: inline-block;
            transition: 0.3s;
        }

        .botao-youtube:hover {
            background: white;
            color: black;
            transform: translateY(-5px);
        }

        footer {
            width: 100%;
            padding: 40px;
            background: rgba(0,0,0,0.9);
            text-align: center;
            border-top: 1px solid #222;
        }

        .sociais a { color: #c5a059; margin: 0 15px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Q'SHOW</div>
        <div class="player-live">
            <div class="blink"></div>
            <span style="font-size: 0.8rem; font-weight: bold;">AO VIVO</span>
            <audio controls style="height: 25px; margin-left: 5px;">
                <source src="https://hts09.brascast.com:7988/live" type="audio/mpeg">
            </audio>
        </div>
    </header>

    <main>
        <div id="container-diario"></div>
    </main>

    <footer>
        <div class="sociais">
            <a href="https://www.instagram.com/qshowweb" target="_blank">INSTAGRAM</a>
            <a href="https://m.youtube.com/@qshowweb" target="_blank">YOUTUBE</a>
        </div>
    </footer>

    <script>
        // Lista de recordações (Pode preencher com 365 itens depois)
        const recordacoes = [
            { filme: "De Volta Para o Futuro", musica: "The Power of Love - Huey Lewis" },
            { filme: "O Rei Leão", musica: "Can You Feel the Love Tonight" },
            { filme: "Titanic", musica: "My Heart Will Go On" },
            { filme: "Top Gun", musica: "Take My Breath Away" }
        ];

        function atualizarPagina() {
            const data = new Date();
            const inicio = new Date(data.getFullYear(), 0, 0);
            const dia = Math.floor((data - inicio) / 86400000) - 1;

            const hoje = recordacoes[dia % recordacoes.length];
            const query = encodeURIComponent(hoje.filme + " " + hoje.musica + " official video");
            const link = `https://www.youtube.com/results?search_query=${query}`;

            document.getElementById('container-diario').innerHTML = `
                <div class="card">
                    <span class="label-hoje">Recordação do Dia</span>
                    <h2 class="titulo-filme">${hoje.filme}</h2>
                    <p class="nome-musica">${hoje.musica}</p>
                    <a href="${link}" target="_blank" class="botao-youtube">Ouvir no YouTube</a>
                </div>
            `;
        }

        window.onload = atualizarPagina;
    </script>
</body>
</html>
